name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build option docs
        run: nix build .#docs

      - name: Assemble site
        run: |
          mkdir -p _site
          cp result/options.md _site/
          cat > _site/index.md << 'EOF'
          ---
          title: Omanix Documentation
          ---

          # Omanix

          A declarative NixOS desktop environment based on Hyprland.

          - [Options Reference](options.md)
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
